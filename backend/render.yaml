services:
  - type: web
    name: premium-reklam-api
    runtime: docker
    repo: https://github.com/BTB60/backandpremiumreklam
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
