server:
  port: 8080

spring:
  datasource:
    # ✅ Убран MODE=PostgreSQL — он вызывает генерацию RETURNING
    url: jdbc:h2:mem:premium_reklam;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    # ✅ Явно указываем H2 диалект — чтобы Hibernate не генерировал PostgreSQL-синтаксис
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        # ✅ Отключаем использование RETURNING для INSERT
        use_sql_comments: false

app:
  jwt:
    secret: localDevSecretKeyForTestingOnly12345678901234567890
    expiration: 86400000

logging:
  level:
    az.premiumreklam: DEBUG