# Premium Reklam — Spring Boot configuration
# Active profile: SPRING_PROFILES_ACTIVE (default: local = H2 in-memory)

spring:
  application:
    name: premium-reklam-backend
  profiles:
    default: local

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:premium_reklam;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:localDevSecretKeyForTestingOnly12345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:decorapp}
    username: ${DB_USERNAME:decorapp}
    password: ${DB_PASSWORD:decorapp123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dockerDevJwtSecretKeyMustBe32CharsOrMore!!}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: INFO
    org.springframework.security: WARN

---
# Production / Render (SPRING_PROFILES_ACTIVE=production or prod)
# Note: comma-separated on-profile means ALL listed profiles must be active (AND).
# Use | for OR so a single active profile (e.g. production) loads this block.
spring:
  config:
    activate:
      on-profile: "production | prod"

  # Set DATABASE_URL or NEON_DATABASE_URL (etc.) in Render — see PostgresDatasourceUrlSupport.
  # Empty default avoids a literal "${DATABASE_URL}" when the env var is missing.
  datasource:
    url: ${DATABASE_URL:}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      # validate fails on empty DB (first deploy). Use DDL_AUTO=validate when schema is managed (e.g. Flyway).
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

jwt:
  secret: ${APP_JWT_SECRET:${JWT_SECRET:changeThisSecretInProdMin32CharsLong!!}}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework.web: WARN
