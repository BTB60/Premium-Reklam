server:
  port: 8080

spring:
  application:
    name: premium-reklam-backend

  datasource:
    # ✅ Жёсткий URL. Переменные ${...} убраны полностью.
    url: jdbc:postgresql://localhost:5432/premium_reklam
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: localDevSecretKeyForTestingOnly12345678901234567890
    expiration: 86400000

cors:
  allowed-origins: "*"

logging:
  level:
    az.premiumreklam: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG