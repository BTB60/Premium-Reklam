# Premium Reklam — Spring Boot configuration
# Active profile: SPRING_PROFILES_ACTIVE (default: local = H2 in-memory)

spring:
  application:
    name: premium-reklam-backend
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 10MB
  profiles:
    default: local

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://premium-reklam.vercel.app,https://*.vercel.app,https://premiumreklam.shop,https://*.premiumreklam.shop,http://localhost:*,http://127.0.0.1:*}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:premium_reklam;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: ${PORT:8080}
  tomcat:
    max-http-post-size: 10MB
    max-swallow-size: 10MB

jwt:
  secret: ${JWT_SECRET:localDevSecretKeyForTestingOnly12345678901234567890}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  tomcat:
    max-http-post-size: 10MB
    max-swallow-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: INFO
    org.springframework.security: WARN

---
# Production / Render / VPS PostgreSQL
# Aktiv profil: SPRING_PROFILES_ACTIVE=production (və ya prod)
# Vacib mühit dəyişənləri: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD, JWT_SECRET
# Nümunə fayl: repo kökündə deploy/backend.env.example və README.md (Hostinger VPS bölməsi)
#
# Note: comma-separated on-profile means ALL listed profiles must be active (AND).
# Use | for OR so a single active profile (e.g. production) loads this block.
spring:
  config:
    activate:
      on-profile: "production | prod"

  # Render/VPS: SPRING_DATASOURCE_* — PostgresDatasourceUrlSupport DATABASE_URL dəstəkləyə bilər.
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    # Render env: SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect (optional; default below)
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      # validate fails on empty DB (first deploy). Use DDL_AUTO=validate when schema is managed (e.g. Flyway).
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

server:
  port: ${PORT:8080}
  # Render health checks need the process listening on all interfaces (not only loopback).
  address: 0.0.0.0
  tomcat:
    max-http-post-size: 10MB
    max-swallow-size: 10MB

jwt:
  secret: ${APP_JWT_SECRET:${JWT_SECRET}}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    az.premiumreklam: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework.web: WARN
