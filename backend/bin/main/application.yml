server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: premium-reklam-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/premium_reklam}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# JWT Configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-in-production}
    expiration: ${JWT_EXPIRATION:86400000}

# Logging
logging:
  level:
    az.premiumreklam: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
